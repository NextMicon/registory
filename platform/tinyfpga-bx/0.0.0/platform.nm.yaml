clk: 16000000

mem:
  ram: [0, 8192]
  flash: [0x00050000, 0x00080000]
  user: [0x00000000, 0x00000000]

pin:
  led: o
  pin01: io
  pin02: io
  pin03: io
  pin04: io
  pin05: io
  pin06: io
  pin07: io
  pin08: io
  pin09: io
  pin10: io
  pin11: io
  pin12: io
  pin13: io
  pin14: io
  pin15: io
  pin16: io
  pin17: io
  pin18: io
  pin19: io
  pin20: io
  pin21: io
  pin22: io
  pin23: io
  pin24: io
  pin25: io
  pin26: io
  pin27: io
  pin28: io
  pin29: io
  pin30: io
  pin31: io

intr:
  irq2: ""

scripts:
  linux:
    transpile:
      cmd: micon transpile
      src:
        - project.nm.yaml
        - package/**/*.sv
        - package/**/*.veryl
      dst:
        - software/micon.rs
        - hardware/main.veryl

    veryl:
      cmd: |
        set -e
        # main.veryl → main.sv (strip "build_" prefix)
        mkdir -p build/veryl_src
        cp hardware/main.veryl build/veryl_src/
        printf '[project]\nname = "build"\nversion = "0.0.0"\n[build]\nsources = ["."]\ntarget = {type = "directory", path = "out"}\n' > build/veryl_src/Veryl.toml
        (cd build/veryl_src && veryl build)
        for f in build/veryl_src/out/*.sv; do sed 's/build_//g' "$f" > "build/$(basename "$f" | sed 's/^build_//')"; done
        # platform sv
        cp platform/hardware/*.sv build/ 2>/dev/null || true
        # package + hardware veryl → package_*.sv
        mkdir -p build/modules
        cp package/*/*.veryl build/modules/ 2>/dev/null || true
        find hardware -maxdepth 1 -name '*.veryl' ! -name 'main.veryl' -exec cp {} build/modules/ \; 2>/dev/null || true
        if ls build/modules/*.veryl 1>/dev/null 2>&1; then
          printf '[project]\nname = "package"\nversion = "0.0.0"\n' > build/modules/Veryl.toml
          (cd build/modules && veryl build)
        fi
        # read_sv.ys
        find build -name '*.sv' -not -path '*/veryl_src/*' -not -path '*/dependencies/*' | sort | sed 's/^/read_verilog -sv /' > build/read_sv.ys
      src:
        - hardware/**/*.veryl
        - package/**/*.veryl
        - platform/hardware/*.sv
      dst:
        - build/main.sv
        - build/read_sv.ys

    synthesis:
      cmd: yosys -s build/read_sv.ys -p "synth_ice40 -top top -json build/out.json"
      src:
        - build/read_sv.ys
        - build/*.sv
      dst:
        - build/out.json

    pnr:
      cmd: "nextpnr-ice40 --lp8k --package cm81 --pcf platform/hardware/pin.pcf --json build/out.json --asc build/out.asc"
      src:
        - build/out.json
        - platform/hardware/pin.pcf
      dst:
        - build/out.asc

    bitstream:
      cmd: "icepack build/out.asc build/out.bin"
      src:
        - build/out.asc
      dst:
        - build/out.bin

    fw-compile:
      cmd: "rustc --edition 2021 --target riscv32im-unknown-none-elf -C opt-level=s -C panic=abort --emit=obj -o build/fw.o software/main.rs"
      src:
        - software/*.rs
      dst:
        - build/fw.o

    fw-link:
      cmd: "riscv64-unknown-elf-gcc -march=rv32im -mabi=ilp32 -nostartfiles -Wl,-Bstatic,-T,platform/software/sections.lds,--strip-debug,--no-warn-mismatch -O3 -ffreestanding -nostdlib -o build/fw.elf platform/software/start.S build/fw.o"
      src:
        - build/fw.o
        - platform/software/start.S
        - platform/software/sections.lds
      dst:
        - build/fw.elf

    fw-bin:
      cmd: "riscv64-unknown-elf-objcopy -O binary build/fw.elf build/fw.bin && truncate -s %256 build/fw.bin"
      src:
        - build/fw.elf
      dst:
        - build/fw.bin

    flash:
      cmd: "tinyprog -p build/out.bin -u build/fw.bin"
      src:
        - build/out.bin
        - build/fw.bin

    flash-wsl:
      cmd: |
        set -e
        cp build/out.bin /mnt/c/tmp/out.bin
        cp build/fw.bin /mnt/c/tmp/fw.bin
        cmd.exe /C "tinyprog -p C:\\tmp\\out.bin -u C:\\tmp\\fw.bin"
      src:
        - build/out.bin
        - build/fw.bin

    testbench:
      cmd: micon testbench
      src:
        - sim/*/stimuli.nm.yaml
      dst:
        - sim/*/tb_top.cpp

    verilator:
      cmd: |
        set -e
        SIM_DIR=sim/$MICON_SIM_ID
        cat > $SIM_DIR/fpga_stubs.sv <<'SV'
        module SB_IO #(
            parameter [5:0] PIN_TYPE = 6'b0,
            parameter PULLUP = 1'b0
        ) (
            inout  PACKAGE_PIN,
            input  OUTPUT_ENABLE,
            input  D_OUT_0,
            output D_IN_0
        );
            assign PACKAGE_PIN = OUTPUT_ENABLE ? D_OUT_0 : 1'bz;
            assign D_IN_0 = PACKAGE_PIN;
        endmodule
        SV
        SV_FILES=$(sed 's/read_verilog -sv //' build/read_sv.ys)
        verilator --cc --exe --build --trace --top-module top \
          $SIM_DIR/fpga_stubs.sv $SV_FILES $SIM_DIR/tb_top.cpp \
          -o sim_top --Mdir $SIM_DIR/obj_dir \
          -Wno-PINMISSING -Wno-WIDTHTRUNC -Wno-WIDTHEXPAND -Wno-WIDTHXZEXPAND \
          -Wno-CASEINCOMPLETE -Wno-UNSIGNED -Wno-UNOPTFLAT -Wno-MULTITOP \
          -Wno-TIMESCALEMOD -Wno-CASEOVERLAP -Wno-LATCH -Wno-IMPLICIT -Wno-fatal
        $SIM_DIR/obj_dir/sim_top
      src:
        - build/read_sv.ys
        - build/*.sv
        - sim/*/tb_top.cpp
      dst:
        - sim/*/out.vcd

  windows:
    transpile:
      cmd: micon transpile
      src:
        - project.nm.yaml
        - package\**\*.sv
        - package\**\*.veryl
      dst:
        - software\micon.rs
        - hardware\main.veryl

    synthesis:
      cmd: yosys -s build\read_sv.ys -p "synth_ice40 -top top -json build\out.json"
      src:
        - build\read_sv.ys
        - build\*.sv
      dst:
        - build\out.json

    pnr:
      cmd: nextpnr-ice40 --lp8k --package cm81 --pcf platform\hardware\pin.pcf --json build\out.json --asc build\out.asc
      src:
        - build\out.json
        - platform\hardware\pin.pcf
      dst:
        - build\out.asc

    bitstream:
      cmd: icepack build\out.asc build\out.bin
      src:
        - build\out.asc
      dst:
        - build\out.bin

    flash:
      cmd: tinyprog -p build\out.bin
      src:
        - build\out.bin

  macos: {}
