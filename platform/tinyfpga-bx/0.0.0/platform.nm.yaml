clk: 16000000

mem:
  ram: [0, 8192]
  flash: [0x00050000, 0x00080000]
  user: [0x03000000, 0xFF000000]

pin:
  led: o
  pin01: io
  pin02: io
  pin03: io
  pin04: io
  pin05: io
  pin06: io
  pin07: io
  pin08: io
  pin09: io
  pin10: io
  pin11: io
  pin12: io
  pin13: io
  pin14: io
  pin15: io
  pin16: io
  pin17: io
  pin18: io
  pin19: io
  pin20: io
  pin21: io
  pin22: io
  pin23: io
  pin24: io
  pin25: io
  pin26: io
  pin27: io
  pin28: io
  pin29: io
  pin30: io
  pin31: io

intr:
  irq2: ""

scripts:
  linux:
    generate:
      cmd: micon generate
      src:
        - project.nm.yaml
        - global/**/*.veryl
        - local/**/*.veryl
      dst:
        - software/micon.rs
        - micon.veryl

    synth:
      cmd: |
        set -e
        veryl build
        mv micon.f build/micon.f
        sed 's/^/read_verilog -sv /' build/micon.f > build/read_sv.ys
        printf 'read_verilog -sv %s\n' platform/hardware/*.sv >> build/read_sv.ys
        yosys -s build/read_sv.ys -p "synth_ice40 -top top -json build/out.json"
      src:
        - micon.veryl
        - local/**/*.veryl
        - global/**/*.veryl
        - platform/hardware/*.sv
      dst:
        - build/out.json

    pnr:
      cmd: |
        set -e
        nextpnr-ice40 --lp8k --package cm81 --threads $(nproc) \
          --pcf platform/hardware/pin.pcf \
          --json build/out.json --asc build/out.asc
        icetime -d lp8k -c 12 -mtr build/timing.rpt build/out.asc
      src:
        - build/out.json
        - platform/hardware/pin.pcf
      dst:
        - build/out.asc

    bitstream:
      cmd: "icepack build/out.asc build/out.bin"
      src:
        - build/out.asc
      dst:
        - build/out.bin

    compile:
      cmd: |
        set -e
        mkdir -p build
        rustc --edition 2021 --target riscv32im-unknown-none-elf \
          -C opt-level=s -C panic=abort --emit=obj \
          -o build/fw.o software/main.rs
        riscv64-unknown-elf-gcc -march=rv32im -mabi=ilp32 -nostartfiles \
          -Wl,-Bstatic,-T,platform/software/sections.lds,--strip-debug,-Map=build/fw.map,--cref,--no-warn-mismatch \
          -O3 -ffreestanding -nostdlib \
          -o build/fw.elf platform/software/start.S build/fw.o
        riscv64-unknown-elf-objcopy -O binary build/fw.elf build/fw.bin
        truncate -s %256 build/fw.bin
        riscv64-unknown-elf-objdump --demangle -D build/fw.elf > build/fw.objdump
        riscv64-unknown-elf-nm --demangle --numeric-sort build/fw.elf > build/fw.nm
      src:
        - software/*.rs
        - Cargo.toml
        - platform/software/start.S
        - platform/software/sections.lds
      dst:
        - build/fw.bin

    flash:
      cmd: "tinyprog -p build/out.bin -u build/fw.bin"
      src:
        - build/out.bin
        - build/fw.bin

    flash-wsl:
      cmd: |
        set -e
        cp build/out.bin /mnt/c/tmp/out.bin
        cp build/fw.bin /mnt/c/tmp/fw.bin
        powershell.exe -c 'tinyprog -p C:\tmp\out.bin -u C:\tmp\fw.bin'
      src:
        - build/out.bin
        - build/fw.bin

    simulate:
      cmd: |
        set -e
        # Generate flash hex from firmware binary (16MB image, FW at 0x050000)
        dd if=/dev/zero bs=1 count=$((0x050000)) 2>/dev/null > build/simu_flash.bin
        cat build/fw.bin >> build/simu_flash.bin
        truncate -s 16M build/simu_flash.bin
        xxd -c 1 -p build/simu_flash.bin > build/simu_flash.hex
        echo "  Flash hex: $(stat -c%s build/fw.bin) bytes FW at 0x050000"
        # Patch !| for iverilog compatibility
        SV_FILES=$(sed 's/read_verilog -sv //' build/read_sv.ys)
        for f in $SV_FILES; do
          python3 -c "
        import re, sys
        with open(sys.argv[1]) as fh: s = fh.read()
        s = re.sub(r'(?<=[( &|,])!\|(\w+)', r'!(|\1)', s)
        with open(sys.argv[1], 'w') as fh: fh.write(s)
          " "$f"
        done
        # Detect Serial module presence (enables UART monitor in test.sv)
        EXTRA_DEFINES=""
        if grep -q "module Serial" $SV_FILES 2>/dev/null; then
          EXTRA_DEFINES="-DHAS_SERIAL"
        fi
        # Copy cells_sim.v and patch its `timescale to 1ns/1ns so that iverilog's
        # VCD precision matches the testbench (1 clock = 2 time units in VCD).
        ORIG_CELLS_SIM=$(yosys-config --datdir/ice40/cells_sim.v)
        cp "$ORIG_CELLS_SIM" build/cells_sim.v
        sed -i '1s|^`timescale.*|`timescale 1 ns / 1 ns|' build/cells_sim.v
        # Compile and run with iverilog
        iverilog -g2012 -o build/sim \
          -DNO_ICE40_DEFAULT_ASSIGNMENTS \
          $EXTRA_DEFINES \
          platform/simulate/test.sv \
          $SV_FILES \
          build/cells_sim.v
        echo "  Running simulation..."
        vvp build/sim
        echo "  VCD: build/simulation.vcd"
        mkdir -p simulation
        micon signal build/simulation.vcd -o simulation/signals.nm.yaml
      src:
        - build/read_sv.ys
        - build/*.sv
        - build/modules/*.sv
        - build/fw.bin
      dst:
        - build/simulation.vcd
        - simulation/signals.nm.yaml

  windows:
    generate:
      cmd: micon generate
      src:
        - project.nm.yaml
        - global\**\*.veryl
        - local\**\*.veryl
      dst:
        - software\micon.rs
        - hardware\main.veryl

    synth:
      cmd: yosys -s build\read_sv.ys -p "synth_ice40 -top top -json build\out.json"
      src:
        - build\read_sv.ys
        - build\*.sv
      dst:
        - build\out.json

    pnr:
      cmd: nextpnr-ice40 --lp8k --package cm81 --pcf platform\hardware\pin.pcf --json build\out.json --asc build\out.asc
      src:
        - build\out.json
        - platform\hardware\pin.pcf
      dst:
        - build\out.asc

    bitstream:
      cmd: icepack build\out.asc build\out.bin
      src:
        - build\out.asc
      dst:
        - build\out.bin

    flash:
      cmd: tinyprog -p build\out.bin
      src:
        - build\out.bin

  macos: {}
